<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracker — Ayush</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050810; --surface:#0c1120; --border:rgba(99,179,255,0.12);
    --border-bright:rgba(99,179,255,0.3); --accent:#63b3ff; --accent3:#34d399;
    --text:#e2e8f0; --text-dim:#64748b;
    --font-display:'Syne',sans-serif; --font-mono:'Space Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-display);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 10% 0%,rgba(99,179,255,0.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 90% 100%,rgba(167,139,250,0.06) 0%,transparent 60%);pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999;}
  .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(99,179,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,179,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .container{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:40px 24px 60px;}

  /* HEADER */
  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:40px;animation:fadeUp 0.6s ease both;}
  .header-left h1{font-size:13px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
  .header-left p{font-size:32px;font-weight:800;line-height:1.1;}
  .header-left p span{color:var(--accent);}
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;padding-top:4px;}
  .sync-badge{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;white-space:nowrap;}
  .sync-badge.synced{border-color:rgba(52,211,153,0.3);color:var(--accent3);}
  .refresh-btn{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;cursor:pointer;transition:all 0.2s;}
  .refresh-btn:hover{border-color:var(--border-bright);color:var(--accent);}
  .refresh-btn:disabled{opacity:0.4;cursor:default;}

  /* STAT CARDS */
  .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:28px;animation:fadeUp 0.6s 0.1s ease both;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 20px;position:relative;overflow:hidden;transition:border-color 0.3s,transform 0.2s;}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-accent,var(--accent));opacity:0.6;}
  .stat-card:hover{border-color:var(--border-bright);transform:translateY(-2px);}
  .stat-card .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
  .stat-card .val{font-size:42px;font-weight:800;line-height:1;margin-bottom:4px;}
  .stat-card .sub{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);}

  /* ERROR BAR */
  .err-bar{font-family:var(--font-mono);font-size:11px;color:#f87171;padding:10px 14px;background:rgba(248,113,113,0.08);border-radius:10px;border:1px solid rgba(248,113,113,0.2);margin-bottom:20px;display:none;}

  /* CALENDAR */
  .cal-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;animation:fadeUp 0.6s 0.2s ease both;}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .cal-nav h2{font-size:20px;font-weight:800;letter-spacing:0.02em;}
  .nav-btn{width:38px;height:38px;border-radius:10px;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
  .nav-btn:hover{border-color:var(--border-bright);color:var(--accent);}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-dow{font-family:var(--font-mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);text-align:center;padding:6px 0 10px;}

  .cal-day{min-height:72px;border-radius:10px;padding:8px 6px 6px;border:1px solid transparent;transition:border-color 0.2s,background 0.2s;display:flex;flex-direction:column;gap:4px;}
  .cal-day.has-data{border-color:var(--border);background:rgba(99,179,255,0.02);}
  .cal-day.has-data:hover{border-color:var(--border-bright);background:rgba(99,179,255,0.05);}
  .cal-day.today{border-color:rgba(99,179,255,0.4);background:rgba(99,179,255,0.06);}
  .cal-day.empty{pointer-events:none;}
  .cal-day.other-month .day-num{color:rgba(100,116,139,0.35);}

  .day-num{font-family:var(--font-mono);font-size:11px;font-weight:700;color:var(--text-dim);line-height:1;}
  .cal-day.today .day-num{color:var(--accent);}

  .app-pill{font-family:var(--font-mono);font-size:10px;font-weight:700;background:rgba(99,179,255,0.15);color:var(--accent);border:1px solid rgba(99,179,255,0.25);border-radius:6px;padding:3px 6px;text-align:center;line-height:1.2;}

  /* LOADING STATE */
  .loading-overlay{position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;animation:fadeUp 0.3s ease both;}
  .loading-overlay p{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);letter-spacing:0.1em;}
  .pulse-ring{width:48px;height:48px;border:2px solid var(--border-bright);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}

  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes countUp{from{opacity:0;transform:scale(0.8);}to{opacity:1;transform:scale(1);}}
  .val.pop{animation:countUp 0.4s cubic-bezier(0.16,1,0.3,1) both;}

  @media(max-width:600px){
    .stats-grid{grid-template-columns:1fr 1fr;}
    .header-left p{font-size:24px;}
    .cal-day{min-height:54px;padding:6px 4px 4px;}
    .app-pill{font-size:9px;}
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

<!-- LOADING SCREEN -->
<div class="loading-overlay" id="loading">
  <div class="pulse-ring"></div>
  <p>connecting to notion...</p>
</div>

<!-- DASHBOARD -->
<div class="container">
  <header>
    <div class="header-left">
      <h1>// job tracker</h1>
      <p>Application<br><span>Dashboard</span></p>
    </div>
    <div class="header-right">
      <div class="sync-badge" id="sync-badge">not synced</div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">&#8635; refresh</button>
    </div>
  </header>

  <div class="err-bar" id="err-bar"></div>

  <div class="stats-grid">
    <div class="stat-card" style="--card-accent:#63b3ff">
      <div class="lbl">Total Applications</div>
      <div class="val" id="s-total" style="color:#63b3ff">—</div>
      <div class="sub">all time</div>
    </div>
    <div class="stat-card" style="--card-accent:#63b3ff">
      <div class="lbl">Today</div>
      <div class="val" id="s-today" style="color:#63b3ff">—</div>
      <div class="sub" id="s-date">—</div>
    </div>
  </div>

  <div class="cal-card">
    <div class="cal-nav">
      <button class="nav-btn" id="prev-btn" onclick="shiftMonth(-1)">&#8592;</button>
      <h2 id="cal-title">—</h2>
      <button class="nav-btn" id="next-btn" onclick="shiftMonth(1)">&#8594;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</div>

<script>
const WORKER_URL = "https://mute-term-1de0.ayush-panigrahy.workers.dev/";

// dateCounts: { "2026-04-06": 5, ... }
let dateCounts = {};
let calYear, calMonth; // currently displayed month

async function loadData() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  btn.textContent = "syncing...";
  document.getElementById("err-bar").style.display = "none";

  try {
    const res = await fetch(WORKER_URL);
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error || "HTTP " + res.status);
    }
    const data = await res.json();
    render(data.pages || []);

    const now = new Date();
    const badge = document.getElementById("sync-badge");
    badge.textContent = "synced " + now.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
    badge.classList.add("synced");
  } catch(e) {
    showErr(e.message || "Failed to load. Check your Worker URL.");
  }

  document.getElementById("loading").style.display = "none";
  btn.disabled = false;
  btn.innerHTML = "&#8635; refresh";
}

function render(pages) {
  const today = new Date().toISOString().slice(0,10);

  // Build date counts map
  dateCounts = {};
  pages.forEach(p => {
    if (!p.date) return;
    const d = p.date.slice(0,10);
    dateCounts[d] = (dateCounts[d] || 0) + 1;
  });

  const total = pages.length;
  setVal("s-total", total);
  setVal("s-today", dateCounts[today] || 0);

  const mn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const [,m,d] = today.split("-");
  document.getElementById("s-date").textContent = mn[+m-1] + " " + +d;

  // Set calendar to current month on first load
  const now = new Date();
  if (calYear === undefined) {
    calYear  = now.getFullYear();
    calMonth = now.getMonth();
  }

  renderCalendar();
}

function renderCalendar() {
  const MONTHS = ["January","February","March","April","May","June",
                  "July","August","September","October","November","December"];
  const DOWS   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  document.getElementById("cal-title").textContent = MONTHS[calMonth] + " " + calYear;

  const todayStr = new Date().toISOString().slice(0,10);
  const grid = document.getElementById("cal-grid");
  grid.innerHTML = "";

  // Day-of-week headers
  DOWS.forEach(d => {
    const el = document.createElement("div");
    el.className = "cal-dow";
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev  = new Date(calYear, calMonth, 0).getDate();

  let cells = [];

  // Leading cells from previous month
  for (let i = firstDay - 1; i >= 0; i--) {
    cells.push({ day: daysInPrev - i, month: calMonth - 1, year: calYear, other: true });
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, month: calMonth, year: calYear, other: false });
  }

  // Trailing cells to complete the last row
  const remainder = cells.length % 7;
  if (remainder !== 0) {
    for (let d = 1; d <= 7 - remainder; d++) {
      cells.push({ day: d, month: calMonth + 1, year: calYear, other: true });
    }
  }

  cells.forEach(c => {
    const m  = ((c.month % 12) + 12) % 12;
    const yr = c.year + Math.floor(c.month / 12);
    const dateStr = yr + "-" + String(m + 1).padStart(2,"0") + "-" + String(c.day).padStart(2,"0");
    const count = dateCounts[dateStr] || 0;
    const isToday = dateStr === todayStr;

    const cell = document.createElement("div");
    cell.className = "cal-day" +
      (c.other ? " other-month" : "") +
      (count > 0 ? " has-data" : "") +
      (isToday ? " today" : "");

    const numEl = document.createElement("div");
    numEl.className = "day-num";
    numEl.textContent = c.day;
    cell.appendChild(numEl);

    if (count > 0) {
      const pill = document.createElement("div");
      pill.className = "app-pill";
      pill.textContent = count + (count === 1 ? " app" : " apps");
      cell.appendChild(pill);
    }

    grid.appendChild(cell);
  });
}

function shiftMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

function setVal(id, val) {
  const el = document.getElementById(id);
  el.textContent = val;
  el.classList.remove("pop");
  void el.offsetWidth;
  el.classList.add("pop");
}

function showErr(msg) {
  document.getElementById("loading").style.display = "none";
  const el = document.getElementById("err-bar");
  el.textContent = "Error: " + msg;
  el.style.display = "block";
}

window.addEventListener("DOMContentLoaded", loadData);
</script>
</body>
</html>
