<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracker — Ayush</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050810; --surface:#0c1120; --border:rgba(99,179,255,0.12);
    --border-bright:rgba(99,179,255,0.3); --accent:#63b3ff; --accent3:#34d399;
    --danger:#f87171; --warning:#fbbf24; --text:#e2e8f0; --text-dim:#64748b;
    --font-display:'Syne',sans-serif; --font-mono:'Space Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-display);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 10% 0%,rgba(99,179,255,0.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 90% 100%,rgba(167,139,250,0.06) 0%,transparent 60%);pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999;}
  .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(99,179,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,179,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .container{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:40px 24px 60px;}

  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:40px;animation:fadeUp 0.6s ease both;}
  .header-left h1{font-size:13px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
  .header-left p{font-size:32px;font-weight:800;line-height:1.1;}
  .header-left p span{color:var(--accent);}
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;padding-top:4px;}
  .sync-badge{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;white-space:nowrap;}
  .sync-badge.synced{border-color:rgba(52,211,153,0.3);color:var(--accent3);}
  .refresh-btn{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;cursor:pointer;transition:all 0.2s;}
  .refresh-btn:hover{border-color:var(--border-bright);color:var(--accent);}
  .refresh-btn:disabled{opacity:0.4;cursor:default;}

  .stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;animation:fadeUp 0.6s 0.1s ease both;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 14px;text-align:center;position:relative;overflow:hidden;transition:border-color 0.3s,transform 0.2s;}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-accent,var(--accent));opacity:0.6;}
  .stat-card:hover{border-color:var(--border-bright);transform:translateY(-2px);}
  .stat-card .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
  .stat-card .val{font-size:30px;font-weight:800;line-height:1;margin-bottom:4px;}
  .stat-card .sub{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);}

  .breakdown-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;animation:fadeUp 0.6s 0.2s ease both;}
  .breakdown-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .breakdown-header h2{font-family:var(--font-mono);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);}
  .total-pill{font-family:var(--font-mono);font-size:11px;color:var(--accent);background:rgba(99,179,255,0.1);border:1px solid rgba(99,179,255,0.2);border-radius:20px;padding:3px 12px;}
  .status-row{display:grid;grid-template-columns:130px 1fr 50px;align-items:center;gap:14px;padding:10px 4px;border-bottom:1px solid rgba(99,179,255,0.05);border-radius:6px;transition:background 0.15s;}
  .status-row:last-child{border-bottom:none;}
  .status-row:hover{background:rgba(99,179,255,0.03);}
  .status-label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);}
  .status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .bar-track{height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);width:0%;}
  .status-num{font-family:var(--font-mono);font-size:13px;font-weight:700;text-align:right;}

  .err-bar{font-family:var(--font-mono);font-size:11px;color:var(--danger);padding:10px 14px;background:rgba(248,113,113,0.08);border-radius:10px;border:1px solid rgba(248,113,113,0.2);margin-bottom:20px;display:none;}

  /* LOADING STATE */
  .loading-overlay{position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;animation:fadeUp 0.3s ease both;}
  .loading-overlay p{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);letter-spacing:0.1em;}
  .pulse-ring{width:48px;height:48px;border:2px solid var(--border-bright);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}

  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes countUp{from{opacity:0;transform:scale(0.8);}to{opacity:1;transform:scale(1);}}
  .val.pop{animation:countUp 0.4s cubic-bezier(0.16,1,0.3,1) both;}

  @media(max-width:600px){
    .stats-grid{grid-template-columns:repeat(3,1fr);}
    .header-left p{font-size:24px;}
    .status-row{grid-template-columns:110px 1fr 40px;}
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

<!-- LOADING SCREEN -->
<div class="loading-overlay" id="loading">
  <div class="pulse-ring"></div>
  <p>connecting to notion...</p>
</div>

<!-- DASHBOARD -->
<div class="container">
  <header>
    <div class="header-left">
      <h1>// job tracker</h1>
      <p>Application<br><span>Dashboard</span></p>
    </div>
    <div class="header-right">
      <div class="sync-badge" id="sync-badge">not synced</div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">&#8635; refresh</button>
    </div>
  </header>

  <div class="err-bar" id="err-bar"></div>

  <div class="stats-grid">
    <div class="stat-card" style="--card-accent:#63b3ff">
      <div class="lbl">Total</div>
      <div class="val" id="s-total" style="color:#63b3ff">—</div>
      <div class="sub">all time</div>
    </div>
    <div class="stat-card" style="--card-accent:#63b3ff">
      <div class="lbl">Today</div>
      <div class="val" id="s-today" style="color:#63b3ff">—</div>
      <div class="sub" id="s-date">—</div>
    </div>
    <div class="stat-card" style="--card-accent:#a78bfa">
      <div class="lbl">Interviews</div>
      <div class="val" id="s-int" style="color:#a78bfa">—</div>
      <div class="sub">confirmed</div>
    </div>
    <div class="stat-card" style="--card-accent:#f87171">
      <div class="lbl">Rejected</div>
      <div class="val" id="s-rej" style="color:#f87171">—</div>
      <div class="sub">confirmed</div>
    </div>
    <div class="stat-card" style="--card-accent:#34d399">
      <div class="lbl">Offers</div>
      <div class="val" id="s-offer" style="color:#34d399">—</div>
      <div class="sub">received</div>
    </div>
  </div>

  <div class="breakdown-card">
    <div class="breakdown-header">
      <h2>// status breakdown</h2>
      <span class="total-pill" id="total-pill">— entries</span>
    </div>
    <div id="status-list"></div>
  </div>
</div>

<script>
// !! REPLACE THIS with your Cloudflare Worker URL after deploying !!
const WORKER_URL = "https://mute-term-1de0.ayush-panigrahy.workers.dev/";

const STATUS_META = [
  { name:"Applied",         color:"#63b3ff" },
  { name:"Under Review",    color:"#fbbf24" },
  { name:"Interview",       color:"#a78bfa" },
  { name:"Offer",           color:"#34d399" },
  { name:"Rejected",        color:"#f87171" },
  { name:"Position Closed", color:"#94a3b8" },
  { name:"Withdrawn",       color:"#64748b" },
];

async function loadData() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  btn.textContent = "syncing...";
  document.getElementById("err-bar").style.display = "none";

  try {
    const res = await fetch(WORKER_URL);
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error || "HTTP " + res.status);
    }
    const data = await res.json();
    render(data.pages || []);

    const now = new Date();
    const badge = document.getElementById("sync-badge");
    badge.textContent = "synced " + now.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
    badge.classList.add("synced");
  } catch(e) {
    showErr(e.message || "Failed to load. Check your Worker URL.");
  }

  document.getElementById("loading").style.display = "none";
  btn.disabled = false;
  btn.innerHTML = "&#8635; refresh";
}

function render(pages) {
  const today = new Date().toISOString().slice(0,10);
  const counts = {};
  let todayCount = 0;

  pages.forEach(p => {
    counts[p.status] = (counts[p.status] || 0) + 1;
    if (p.date && p.date.slice(0,10) === today) todayCount++;
  });

  const total = pages.length;
  setVal("s-total", total);
  setVal("s-today", todayCount);
  setVal("s-int",   counts["Interview"]       || 0);
  setVal("s-rej",   counts["Rejected"]        || 0);
  setVal("s-offer", counts["Offer"]           || 0);

  const mn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const [,m,d] = today.split("-");
  document.getElementById("s-date").textContent = mn[+m-1] + " " + +d;
  document.getElementById("total-pill").textContent = total.toLocaleString() + " entries";

  const max = Math.max(...Object.values(counts), 1);
  const list = document.getElementById("status-list");
  list.innerHTML = "";

  STATUS_META.forEach(s => {
    const c = counts[s.name] || 0;
    if (!c) return;
    const pct = Math.round((c / max) * 100);
    const row = document.createElement("div");
    row.className = "status-row";
    row.innerHTML = `
      <div class="status-label">
        <span class="status-dot" style="background:${s.color}"></span>${s.name}
      </div>
      <div class="bar-track"><div class="bar-fill" data-pct="${pct}" style="background:${s.color}"></div></div>
      <div class="status-num" style="color:${s.color}">${c}</div>`;
    list.appendChild(row);
  });

  requestAnimationFrame(() => {
    document.querySelectorAll(".bar-fill").forEach(b => b.style.width = b.dataset.pct + "%");
  });
}

function setVal(id, val) {
  const el = document.getElementById(id);
  el.textContent = val;
  el.classList.remove("pop");
  void el.offsetWidth;
  el.classList.add("pop");
}

function showErr(msg) {
  document.getElementById("loading").style.display = "none";
  const el = document.getElementById("err-bar");
  el.textContent = "Error: " + msg;
  el.style.display = "block";
}

window.addEventListener("DOMContentLoaded", loadData);
</script>
</body>
</html>
