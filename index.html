<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracker — Ayush</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050810; --surface:#0c1120;
    --border:rgba(99,179,255,0.12); --border-bright:rgba(99,179,255,0.3);
    --accent:#63b3ff; --accent3:#34d399; --danger:#f87171; --warning:#fbbf24;
    --text:#e2e8f0; --text-dim:#64748b;
    --font-display:'Syne',sans-serif; --font-mono:'Space Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-display);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 10% 0%,rgba(99,179,255,0.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 90% 100%,rgba(167,139,250,0.06) 0%,transparent 60%);pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999;}
  .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(99,179,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,179,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:28px 24px 60px;}

  /* ── HEADER ── */
  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;}
  .header-left h1{font-size:11px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);margin-bottom:4px;}
  .header-left p{font-size:26px;font-weight:800;line-height:1.1;}
  .header-left p span{color:var(--accent);}
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .sync-row{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
  .sync-badge{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);}
  .sync-badge span{color:var(--accent3);}
  .btn-row{display:flex;gap:8px;}
  .btn{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;border-radius:20px;padding:6px 14px;cursor:pointer;transition:all 0.2s;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);}
  .btn:hover{border-color:var(--border-bright);color:var(--accent);}
  .btn:disabled{opacity:0.4;cursor:default;}
  .btn.btn-gmail{border-color:rgba(251,191,36,0.3);color:var(--warning);}
  .btn.btn-gmail:hover{border-color:rgba(251,191,36,0.6);background:rgba(251,191,36,0.05);}
  .btn.btn-syncing{animation:blink 1s ease infinite;}

  /* ── BARS ── */
  .err-bar{font-family:var(--font-mono);font-size:11px;color:var(--danger);padding:9px 14px;background:rgba(248,113,113,0.08);border-radius:10px;border:1px solid rgba(248,113,113,0.2);margin-bottom:16px;display:none;}
  .info-bar{font-family:var(--font-mono);font-size:11px;color:var(--warning);padding:9px 14px;background:rgba(251,191,36,0.08);border-radius:10px;border:1px solid rgba(251,191,36,0.2);margin-bottom:16px;display:none;}

  /* ── MAIN LAYOUT ── */
  /* Left column: stat cards stacked + calendar below them */
  /* Right column: today's applications (tall) */
  .main-grid{display:grid;grid-template-columns:300px 1fr;gap:16px;margin-bottom:16px;align-items:start;}

  .left-col{display:flex;flex-direction:column;gap:12px;}

  /* ── STAT CARDS ── */
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;position:relative;overflow:hidden;transition:border-color 0.2s,transform 0.2s;}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-accent,var(--accent));opacity:0.6;}
  .stat-card:hover{border-color:var(--border-bright);transform:translateY(-1px);}
  .stat-card .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
  .stat-card .val{font-size:72px;font-weight:800;line-height:1;margin-bottom:2px;}
  .stat-card .sub{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);}

  /* ── CALENDAR ── */
  .cal-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-nav h2{font-size:13px;font-weight:800;}
  .nav-btn{width:28px;height:28px;border-radius:7px;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
  .nav-btn:hover{border-color:var(--border-bright);color:var(--accent);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .cal-dow{font-family:var(--font-mono);font-size:7px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);text-align:center;padding:3px 0 7px;}
  .cal-day{min-height:42px;border-radius:6px;padding:4px 3px 3px;border:1px solid transparent;transition:border-color 0.15s,background 0.15s;display:flex;flex-direction:column;gap:2px;cursor:default;}
  .cal-day.has-data{border-color:var(--border);background:rgba(99,179,255,0.02);cursor:pointer;}
  .cal-day.has-data:hover{border-color:var(--border-bright);background:rgba(99,179,255,0.05);}
  .cal-day.today{border-color:rgba(99,179,255,0.4);background:rgba(99,179,255,0.06);}
  .cal-day.selected{border-color:rgba(99,179,255,0.7)!important;background:rgba(99,179,255,0.12)!important;}
  .cal-day.other-month .day-num{color:rgba(100,116,139,0.3);}
  .day-num{font-family:var(--font-mono);font-size:8px;font-weight:700;color:var(--text-dim);line-height:1;}
  .cal-day.today .day-num{color:var(--accent);}
  .app-pill{font-family:var(--font-mono);font-size:7px;font-weight:700;background:rgba(99,179,255,0.15);color:var(--accent);border:1px solid rgba(99,179,255,0.2);border-radius:3px;padding:1px 3px;text-align:center;line-height:1.4;}

  /* ── RIGHT COL: TODAY ── */
  .today-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;overflow-y:auto;max-height:680px;}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap;}
  .section-title{font-family:var(--font-mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);}
  .section-header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .count-pill{font-family:var(--font-mono);font-size:10px;color:var(--accent);background:rgba(99,179,255,0.1);border:1px solid rgba(99,179,255,0.2);border-radius:20px;padding:3px 10px;white-space:nowrap;}

  /* ── ENTRY ROW ── */
  .entry-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 6px;border-bottom:1px solid rgba(99,179,255,0.06);border-radius:6px;transition:background 0.15s;}
  .entry-row:last-child{border-bottom:none;}
  .entry-row:hover{background:rgba(99,179,255,0.025);}
  .entry-row-top{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;}
  .entry-row-bottom{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center;}

  /* ── ALL ENTRIES ── */
  .all-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
  .date-filter-pill{font-family:var(--font-mono);font-size:10px;color:var(--warning);background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);border-radius:20px;padding:3px 10px;white-space:nowrap;display:none;}
  .clear-filter-btn{font-family:var(--font-mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;border-radius:20px;padding:4px 10px;cursor:pointer;border:1px solid rgba(251,191,36,0.3);background:transparent;color:var(--warning);transition:all 0.2s;display:none;}
  .clear-filter-btn:hover{background:rgba(251,191,36,0.08);}
  .toggle-btn{font-family:var(--font-mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;border-radius:20px;padding:6px 14px;cursor:pointer;transition:all 0.2s;border:1px solid rgba(99,179,255,0.25);background:rgba(99,179,255,0.05);color:var(--accent);}
  .toggle-btn:hover{background:rgba(99,179,255,0.1);}
  .all-entries-wrap{display:none;}
  .all-entries-wrap.open{display:block;}
  .search-bar{margin-bottom:12px;}
  .search-input{width:100%;font-family:var(--font-mono);font-size:11px;background:rgba(99,179,255,0.04);border:1px solid var(--border);border-radius:9px;padding:8px 13px;color:var(--text);outline:none;transition:border-color 0.2s;}
  .search-input:focus{border-color:var(--border-bright);}
  .search-input::placeholder{color:var(--text-dim);}

  .all-entry{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 6px;border-bottom:1px solid rgba(99,179,255,0.05);border-radius:6px;transition:background 0.15s;}
  .all-entry:last-child{border-bottom:none;}
  .all-entry:hover{background:rgba(99,179,255,0.025);}
  .all-entry-top{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;}
  .all-entry-bottom{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center;}

  /* ── SHARED FIELD STYLES ── */
  .field-input{width:100%;font-family:var(--font-mono);font-size:10px;background:rgba(99,179,255,0.04);border:1px solid var(--border);border-radius:7px;padding:5px 7px;color:var(--text);outline:none;transition:border-color 0.2s;}
  .field-input:focus{border-color:var(--border-bright);}
  .field-input.saved{border-color:rgba(52,211,153,0.4);color:var(--accent3);}
  .field-input.company-input{font-size:11px;font-weight:700;color:var(--text);}

  .url-wrap{display:flex;gap:5px;align-items:center;}
  .url-wrap .field-input{flex:1;min-width:0;}
  .copy-btn{font-family:var(--font-mono);font-size:8px;background:rgba(99,179,255,0.06);border:1px solid rgba(99,179,255,0.18);border-radius:6px;padding:5px 7px;color:var(--text-dim);cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
  .copy-btn:hover{border-color:var(--border-bright);color:var(--accent);}
  .copy-btn.copied{border-color:rgba(52,211,153,0.4);color:var(--accent3);}

  .save-btn{font-family:var(--font-mono);font-size:8px;letter-spacing:0.06em;text-transform:uppercase;background:rgba(99,179,255,0.08);border:1px solid rgba(99,179,255,0.2);border-radius:7px;padding:5px 9px;color:var(--accent);cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
  .save-btn:hover{background:rgba(99,179,255,0.18);}
  .save-btn.saving{opacity:0.5;cursor:default;}
  .status-chip{font-family:var(--font-mono);font-size:8px;letter-spacing:0.06em;text-transform:uppercase;border-radius:20px;padding:3px 9px;white-space:nowrap;flex-shrink:0;}

  /* ── LOADING ── */
  .loading-overlay{position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .loading-overlay p{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);letter-spacing:0.1em;}
  .pulse-ring{width:44px;height:44px;border:2px solid var(--border-bright);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}

  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes countUp{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.45;}}
  .val.pop{animation:countUp 0.4s cubic-bezier(0.16,1,0.3,1) both;}

  @media(max-width:800px){
    .main-grid{grid-template-columns:1fr;}
    .header-left p{font-size:22px;}
  }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="loading-overlay" id="loading">
  <div class="pulse-ring"></div>
  <p>connecting to notion...</p>
</div>

<div class="container">
  <header>
    <div class="header-left">
      <h1>// job tracker</h1>
      <p>Application <span>Dashboard</span></p>
    </div>
    <div class="header-right">
      <div class="sync-row">
        <div class="sync-badge" id="db-badge">dashboard &nbsp;—&nbsp; <span>not synced</span></div>
        <div class="sync-badge" id="gmail-badge">gmail &nbsp;—&nbsp; <span>not triggered</span></div>
      </div>
      <div class="btn-row">
        <button class="btn" id="refresh-btn" onclick="loadData()">&#8635; refresh</button>
        <button class="btn btn-gmail" id="gmail-btn" onclick="syncGmail()">&#9993; sync gmail</button>
      </div>
    </div>
  </header>

  <div class="err-bar" id="err-bar"></div>
  <div class="info-bar" id="info-bar"></div>

  <!-- MAIN GRID: left col (stats + calendar) | right col (today) -->
  <div class="main-grid">
    <!-- LEFT -->
    <div class="left-col">
      <div class="stat-card" style="--card-accent:#63b3ff">
        <div class="lbl">Total Applications</div>
        <div class="val" id="s-total" style="color:#63b3ff">—</div>
        <div class="sub">all time</div>
      </div>
      <div class="stat-card" style="--card-accent:#63b3ff">
        <div class="lbl">Today</div>
        <div class="val" id="s-today" style="color:#63b3ff">—</div>
        <div class="sub" id="s-date">—</div>
      </div>
      <!-- CALENDAR -->
      <div class="cal-card">
        <div class="cal-nav">
          <button class="nav-btn" onclick="shiftMonth(-1)">&#8592;</button>
          <h2 id="cal-title">—</h2>
          <button class="nav-btn" onclick="shiftMonth(1)">&#8594;</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>

    <!-- RIGHT: TODAY -->
    <div class="today-card">
      <div class="section-header">
        <span class="section-title">// today's applications</span>
        <span class="count-pill" id="today-pill">0 entries</span>
      </div>
      <div id="today-list"></div>
    </div>
  </div>

  <!-- ALL APPLICATIONS -->
  <div class="all-card">
    <div class="section-header">
      <span class="section-title">// all applications</span>
      <div class="section-header-right">
        <span class="date-filter-pill" id="date-filter-pill"></span>
        <button class="clear-filter-btn" id="clear-filter-btn" onclick="clearDateFilter()">&#10005; show all</button>
        <span class="count-pill" id="all-count-pill">—</span>
        <button class="toggle-btn" id="toggle-all-btn" onclick="toggleAll()">show</button>
      </div>
    </div>
    <div class="all-entries-wrap" id="all-entries-wrap">
      <div class="search-bar">
        <input class="search-input" id="search-input"
          placeholder="search company, role, date (yyyy-mm-dd), status..."
          oninput="filterAll()">
      </div>
      <div id="all-list"></div>
    </div>
  </div>
</div>

<script>
const WORKER_URL = "https://mute-term-1de0.ayush-panigrahy.workers.dev/";
const WEBAPP_URL = "https://script.google.com/a/macros/tamu.edu/s/AKfycbxwGaSRy7sIIaqTS-jVGFotAotjp-vuBcnV0yzGOjUy4zSUyPxf7b4VMqLCFF8KsBuh0w/exec";

let allPages         = [];
let calYear, calMonth;
let allOpen          = false;
let activeDateFilter = null;

const STATUS_COLORS = {
  "Applied":         { bg:"rgba(99,179,255,0.12)",  color:"#63b3ff" },
  "Under Review":    { bg:"rgba(251,191,36,0.12)",  color:"#fbbf24" },
  "Interview":       { bg:"rgba(167,139,250,0.12)", color:"#a78bfa" },
  "Offer":           { bg:"rgba(52,211,153,0.12)",  color:"#34d399" },
  "Position Closed": { bg:"rgba(148,163,184,0.12)", color:"#94a3b8" },
  "Withdrawn":       { bg:"rgba(100,116,139,0.12)", color:"#64748b" },
};

function localToday() {
  const n = new Date();
  return n.getFullYear() + "-"
    + String(n.getMonth() + 1).padStart(2,"0") + "-"
    + String(n.getDate()).padStart(2,"0");
}
function fmtTime() {
  return new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
}

// ── LOAD ──────────────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true; btn.textContent = "loading...";
  document.getElementById("err-bar").style.display = "none";

  try {
    const res = await fetch(WORKER_URL);
    if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || "HTTP " + res.status);
    allPages = (await res.json()).pages || [];
    render();
    document.getElementById("db-badge").innerHTML =
      `dashboard &nbsp;—&nbsp; <span>synced ${fmtTime()}</span>`;
  } catch(e) { showErr(e.message || "Failed to load."); }

  document.getElementById("loading").style.display = "none";
  btn.disabled = false; btn.innerHTML = "&#8635; refresh";
}

// ── GMAIL SYNC ────────────────────────────────────────────────
async function syncGmail() {
  const btn = document.getElementById("gmail-btn");
  btn.disabled = true; btn.classList.add("btn-syncing"); btn.textContent = "syncing...";
  showInfo("Gmail sync triggered. Takes up to 60 seconds, dashboard will auto-refresh.");
  document.getElementById("gmail-badge").innerHTML =
    `gmail &nbsp;—&nbsp; <span>triggered ${fmtTime()}</span>`;
  try { await fetch(WEBAPP_URL + "?action=sync&t=" + Date.now(), { mode:"no-cors" }); } catch(e) {}
  setTimeout(async () => {
    await loadData();
    document.getElementById("info-bar").style.display = "none";
    document.getElementById("gmail-badge").innerHTML =
      `gmail &nbsp;—&nbsp; <span>completed ${fmtTime()}</span>`;
    btn.disabled = false; btn.classList.remove("btn-syncing"); btn.innerHTML = "&#9993; sync gmail";
  }, 45000);
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const today = localToday();
  const dateCounts = {};
  allPages.forEach(p => {
    if (!p.date) return;
    const d = p.date.slice(0,10);
    dateCounts[d] = (dateCounts[d] || 0) + 1;
  });

  const todayPages = allPages.filter(p => p.date && p.date.slice(0,10) === today);
  setVal("s-total", allPages.length);
  setVal("s-today", todayPages.length);

  const MN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const [,m,d] = today.split("-");
  document.getElementById("s-date").textContent = MN[+m-1] + " " + +d;

  if (calYear === undefined) {
    calYear  = new Date().getFullYear();
    calMonth = new Date().getMonth();
  }

  renderCalendar(dateCounts);
  renderToday(todayPages);
  updateAllHeader();
  if (allOpen) filterAll();
}

// ── CALENDAR ──────────────────────────────────────────────────
function getDateCounts() {
  const dc = {};
  allPages.forEach(p => { if(p.date) { const d=p.date.slice(0,10); dc[d]=(dc[d]||0)+1; } });
  return dc;
}

function renderCalendar(dateCounts) {
  const MONTHS = ["January","February","March","April","May","June",
                  "July","August","September","October","November","December"];
  const DOWS   = ["Su","Mo","Tu","We","Th","Fr","Sa"];

  document.getElementById("cal-title").textContent = MONTHS[calMonth] + " " + calYear;
  const todayStr = localToday();
  const grid = document.getElementById("cal-grid");
  grid.innerHTML = "";

  DOWS.forEach(d => {
    const el = document.createElement("div");
    el.className = "cal-dow"; el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev  = new Date(calYear, calMonth, 0).getDate();
  let cells = [];
  for (let i = firstDay - 1; i >= 0; i--)
    cells.push({ day: daysInPrev - i, month: calMonth - 1, year: calYear, other: true });
  for (let d = 1; d <= daysInMonth; d++)
    cells.push({ day: d, month: calMonth, year: calYear, other: false });
  const rem = cells.length % 7;
  if (rem) for (let d = 1; d <= 7 - rem; d++)
    cells.push({ day: d, month: calMonth + 1, year: calYear, other: true });

  cells.forEach(c => {
    const m   = ((c.month % 12) + 12) % 12;
    const yr  = c.year + Math.floor(c.month / 12);
    const ds  = yr + "-" + String(m+1).padStart(2,"0") + "-" + String(c.day).padStart(2,"0");
    const cnt = dateCounts[ds] || 0;

    const cell = document.createElement("div");
    cell.className = "cal-day"
      + (c.other       ? " other-month" : "")
      + (cnt > 0       ? " has-data"    : "")
      + (ds===todayStr         ? " today"     : "")
      + (ds===activeDateFilter ? " selected"  : "");

    const numEl = document.createElement("div");
    numEl.className = "day-num"; numEl.textContent = c.day;
    cell.appendChild(numEl);

    if (cnt > 0) {
      const pill = document.createElement("div");
      pill.className = "app-pill";
      pill.textContent = cnt + (cnt===1?" app":" apps");
      cell.appendChild(pill);
      cell.onclick = () => {
        if (activeDateFilter === ds) { clearDateFilter(); return; }
        activeDateFilter = ds;
        if (!allOpen) toggleAll();
        updateAllHeader(); filterAll();
        renderCalendar(dateCounts);
        setTimeout(() => document.getElementById("all-entries-wrap").scrollIntoView({ behavior:"smooth" }), 100);
      };
    }
    grid.appendChild(cell);
  });
}

function shiftMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar(getDateCounts());
}

function clearDateFilter() {
  activeDateFilter = null;
  document.getElementById("search-input").value = "";
  updateAllHeader(); filterAll();
  renderCalendar(getDateCounts());
}

function updateAllHeader() {
  const fp = document.getElementById("date-filter-pill");
  const cb = document.getElementById("clear-filter-btn");
  if (activeDateFilter) {
    const MN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const [y,m,d] = activeDateFilter.split("-");
    fp.textContent = MN[+m-1] + " " + +d + ", " + y;
    fp.style.display = "block"; cb.style.display = "block";
  } else {
    fp.style.display = "none"; cb.style.display = "none";
  }
}

// ── TODAY ─────────────────────────────────────────────────────
function renderToday(pages) {
  document.getElementById("today-pill").textContent =
    pages.length + " entr" + (pages.length===1?"y":"ies");
  const list = document.getElementById("today-list");
  list.innerHTML = "";
  if (!pages.length) {
    list.innerHTML = `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim);padding:10px 4px;">No applications logged today.</div>`;
    return;
  }
  pages.forEach(p => list.appendChild(buildEntryRow(p, false)));
}

// ── ALL ENTRIES ───────────────────────────────────────────────
function toggleAll() {
  allOpen = !allOpen;
  document.getElementById("all-entries-wrap").classList.toggle("open", allOpen);
  document.getElementById("toggle-all-btn").textContent = allOpen ? "hide" : "show";
  if (allOpen) filterAll();
}

function filterAll() {
  const q = (document.getElementById("search-input").value || "").toLowerCase();
  let filtered = allPages;
  if (activeDateFilter) {
    filtered = filtered.filter(p => p.date && p.date.slice(0,10) === activeDateFilter);
  } else if (q) {
    filtered = filtered.filter(p =>
      (p.company||"").toLowerCase().includes(q) ||
      (p.role   ||"").toLowerCase().includes(q) ||
      (p.status ||"").toLowerCase().includes(q) ||
      (p.date   ||"").includes(q)
    );
  }
  document.getElementById("all-count-pill").textContent =
    filtered.length + " entr" + (filtered.length===1?"y":"ies");

  const list = document.getElementById("all-list");
  list.innerHTML = "";
  if (!filtered.length) {
    list.innerHTML = `<div style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim);padding:10px 4px;">No results.</div>`;
    return;
  }
  [...filtered].sort((a,b)=>(b.date||"").localeCompare(a.date||""))
    .forEach(p => list.appendChild(buildEntryRow(p, true)));
}

// ── ENTRY ROW BUILDER ─────────────────────────────────────────
function buildEntryRow(p, showDate) {
  const sc  = STATUS_COLORS[p.status] || STATUS_COLORS["Applied"];
  const wrap = document.createElement("div");
  wrap.className = showDate ? "all-entry" : "entry-row";

  // Top row: company + role (both editable)
  const topDiv = document.createElement("div");
  topDiv.className = showDate ? "all-entry-top" : "entry-row-top";
  topDiv.innerHTML = `
    <div>
      <input class="field-input company-input" id="co-${p.id}"
        value="${esc(p.company||"")}" placeholder="company..."
        onkeydown="if(event.key==='Enter') saveField('${p.id}')">
      ${showDate ? `<div style="font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-top:3px;">${p.date?p.date.slice(0,10):"—"}</div>` : ""}
    </div>
    <input class="field-input" id="role-${p.id}"
      value="${esc(p.role||"")}" placeholder="role..."
      onkeydown="if(event.key==='Enter') saveField('${p.id}')">`;

  // Bottom row: career url + copy | notes | save | status
  const botDiv = document.createElement("div");
  botDiv.className = showDate ? "all-entry-bottom" : "entry-row-bottom";
  botDiv.innerHTML = `
    <div class="url-wrap">
      <input class="field-input" id="url-${p.id}"
        value="${esc(p.careerPage||"")}" placeholder="career page url..."
        onkeydown="if(event.key==='Enter') saveField('${p.id}')">
      <button class="copy-btn" id="copy-${p.id}" onclick="copyUrl('${p.id}')" title="copy url">&#128203;</button>
    </div>
    <input class="field-input" id="note-${p.id}"
      value="${esc(p.notes||"")}" placeholder="notes..."
      onkeydown="if(event.key==='Enter') saveField('${p.id}')">
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
      <button class="save-btn" id="save-${p.id}" onclick="saveField('${p.id}')">save</button>
      <span class="status-chip" style="background:${sc.bg};color:${sc.color}">${esc(p.status)}</span>
    </div>`;

  wrap.appendChild(topDiv);
  wrap.appendChild(botDiv);
  return wrap;
}

// ── SAVE ──────────────────────────────────────────────────────
async function saveField(pageId) {
  const coInput   = document.getElementById("co-"   + pageId);
  const roleInput = document.getElementById("role-" + pageId);
  const urlInput  = document.getElementById("url-"  + pageId);
  const noteInput = document.getElementById("note-" + pageId);
  const btn       = document.getElementById("save-" + pageId);

  btn.textContent = "saving..."; btn.classList.add("saving"); btn.disabled = true;

  try {
    const res = await fetch(WORKER_URL + "update", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        pageId,
        company:    coInput.value.trim(),
        role:       roleInput.value.trim(),
        careerPage: urlInput.value.trim(),
        notes:      noteInput.value.trim()
      })
    });
    if (!res.ok) throw new Error("Save failed");

    [coInput, roleInput, urlInput, noteInput].forEach(el => el.classList.add("saved"));
    btn.textContent = "saved!";

    const page = allPages.find(p => p.id === pageId);
    if (page) {
      page.company    = coInput.value.trim();
      page.role       = roleInput.value.trim();
      page.careerPage = urlInput.value.trim();
      page.notes      = noteInput.value.trim();
    }
    setTimeout(() => {
      [coInput, roleInput, urlInput, noteInput].forEach(el => el.classList.remove("saved"));
      btn.textContent = "save"; btn.classList.remove("saving"); btn.disabled = false;
    }, 2000);
  } catch(e) {
    btn.textContent = "error";
    setTimeout(() => { btn.textContent = "save"; btn.classList.remove("saving"); btn.disabled = false; }, 2000);
  }
}

// ── COPY URL ─────────────────────────────────────────────────
function copyUrl(pageId) {
  const val = (document.getElementById("url-" + pageId)?.value || "").trim();
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.getElementById("copy-" + pageId);
    btn.classList.add("copied"); btn.textContent = "✓";
    setTimeout(() => { btn.classList.remove("copied"); btn.textContent = "📋"; }, 1500);
  });
}

// ── UTILS ─────────────────────────────────────────────────────
function setVal(id, val) {
  const el = document.getElementById(id);
  el.textContent = val; el.classList.remove("pop"); void el.offsetWidth; el.classList.add("pop");
}
function showErr(msg) {
  document.getElementById("loading").style.display = "none";
  const el = document.getElementById("err-bar"); el.textContent = "Error: " + msg; el.style.display = "block";
}
function showInfo(msg) {
  const el = document.getElementById("info-bar"); el.textContent = msg; el.style.display = "block";
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

window.addEventListener("DOMContentLoaded", loadData);
</script>
